name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    name: Tests (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Show Node.js version
        run: node --version

      - name: CLI smoke test
        run: |
          node bin/osv-check.js --version
          node bin/osv-check.js --help

      - name: Test single package query
        run: node bin/osv-check.js lodash@4.17.20
        continue-on-error: true
