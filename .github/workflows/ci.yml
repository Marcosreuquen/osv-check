name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    name: Tests (Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show Node.js version
        run: node --version

      - name: CLI smoke test
        run: |
          node bin/osv-check.js --version
          node bin/osv-check.js --help

      - name: Test single package query
        run: node bin/osv-check.js lodash@4.17.20
        continue-on-error: true
